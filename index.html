<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Trigger Console</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="Console header">
        <div>
          <h1>Codex Trigger Console</h1>
          <p id="repoLabel">GitHub issue queue</p>
        </div>
        <div class="status-pill" id="statusPill">Ready</div>
      </section>

      <section class="workspace" aria-label="Trigger builder">
        <aside class="project-pane" aria-label="Workflow selection">
          <div class="pane-heading">
            <h2>Workflows</h2>
            <span id="projectCount">0</span>
          </div>
          <label class="field">
            <span>Filter</span>
            <input id="projectFilter" type="search" autocomplete="off" placeholder="Search workflows">
          </label>
          <div class="project-list" id="projectList"></div>
        </aside>

        <section class="builder-pane" aria-label="Issue details">
          <div class="section-title">
            <h2>Trigger Details</h2>
            <span id="selectedProjectLabel">No workflow selected</span>
          </div>

          <div class="form-grid">
            <label class="field">
              <span>Runner</span>
              <select id="runnerSelect"></select>
            </label>
            <label class="field">
              <span>Model</span>
              <select id="modelPresetSelect">
                <option value="cheap-default">Cheap default</option>
                <option value="gpt-5.5-priority">GPT-5.5 Priority</option>
              </select>
            </label>
            <label class="field">
              <span>GitHub owner</span>
              <input id="ownerInput" autocomplete="off" spellcheck="false">
            </label>
            <label class="field">
              <span>GitHub repo</span>
              <input id="repoInput" autocomplete="off" spellcheck="false">
            </label>
          </div>

          <div id="dynamicFields" class="dynamic-fields"></div>
          <div id="commandBuilder" class="command-builder"></div>

          <label class="field">
            <span>Extra context</span>
            <textarea id="contextInput" rows="4" placeholder="Optional context Codex should keep in mind for this workflow or task"></textarea>
          </label>

          <label class="field">
            <span>Issue title</span>
            <input id="titleInput" autocomplete="off" placeholder="Auto-filled from the selected workflow">
          </label>

          <div class="actions">
            <button id="previewButton" class="secondary-button" type="button">Refresh Preview</button>
            <button id="submitButton" class="primary-button" type="button">Open GitHub Issue</button>
          </div>

          <div class="result-row" id="resultRow" hidden></div>
        </section>

        <aside class="preview-pane" aria-label="Issue preview">
          <div class="section-title">
            <h2>Preview</h2>
            <span id="labelPreview">codex:queued</span>
          </div>
          <pre id="issuePreview"></pre>
        </aside>
      </section>
    </main>

    <script src="./app.js?v=20260605-seeddata-lookup-rows"></script>
  </body>
</html>
