<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Trigger Console</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="Console header">
        <div>
          <h1>Codex Trigger Console</h1>
          <p id="repoLabel">GitHub issue queue</p>
        </div>
        <div class="status-pill" id="statusPill">Ready</div>
      </section>

      <section class="workspace outcome-workspace" aria-label="Trigger builder">
        <section class="builder-pane" aria-label="Issue details">
          <div class="section-title">
            <h2>Trigger Details</h2>
            <span id="selectedProjectLabel">Select an outcome</span>
          </div>

          <div class="form-grid outcome-first">
            <label class="field">
              <span>Outcome</span>
              <select id="outcomeSelect"></select>
            </label>
            <label class="field" id="workTypeSelectField" hidden>
              <span>Work type</span>
              <select id="workTypeSelect"></select>
            </label>
          </div>

          <div id="outcomeDetails" hidden>
            <div class="form-grid routing-grid">
            <label class="field" id="projectSelectField" hidden>
              <span>Project</span>
              <select id="projectSelect"></select>
            </label>
            <label class="field" id="runnerSelectField" hidden>
              <span>Runner</span>
              <select id="runnerSelect"></select>
            </label>
            <label class="field" id="modelPresetSelectField" hidden>
              <span>Model</span>
              <select id="modelPresetSelect">
                <option value="cheap-default">Cheap default</option>
                <option value="gpt-5.5-priority">GPT-5.5 Priority</option>
              </select>
            </label>
            <input id="ownerInput" type="hidden">
            <input id="repoInput" type="hidden">
            </div>

            <div id="dynamicFields" class="dynamic-fields"></div>
            <div id="commandBuilder" class="command-builder"></div>

            <label class="field" hidden>
              <span>Extra context</span>
              <textarea id="contextInput" rows="4" placeholder="Optional context Codex should keep in mind for this outcome"></textarea>
            </label>

            <label class="field" hidden>
              <span>Issue title</span>
              <input id="titleInput" autocomplete="off" placeholder="Auto-filled from the selected outcome">
            </label>

            <div class="actions">
              <button id="previewButton" class="secondary-button" type="button">Refresh Preview</button>
              <a id="submitLink" class="primary-button" href="#" target="_blank" rel="noopener">Open GitHub Issue</a>
              <button id="copyIssueUrlButton" class="secondary-button" type="button">Copy GitHub Issue URL</button>
            </div>

            <div class="result-row" id="resultRow" hidden></div>
          </div>
        </section>

        <aside class="preview-pane" id="previewPane" aria-label="Issue preview" hidden>
          <div class="section-title">
            <h2>Preview</h2>
            <span id="labelPreview">codex:queued</span>
          </div>
          <pre id="issuePreview"></pre>
        </aside>
      </section>
    </main>

    <script src="./app.js?v=20260703-outcome-driven-sequence"></script>
  </body>
</html>
